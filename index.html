<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Flappy Pro - Update 4 Skin Fix</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; touch-action: manipulation; font-family: 'Arial Black', sans-serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- MOTOR DE ÁUDIO ---
let audioCtx;
function playSound(freq, type, duration, volume = 0.1) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();

// --- ESTADO ---
let bird = { x: 80, y: 200, radius: 14, velocity: 0, gravity: 0.42, jump: -7.2, shield: false };
let pipes = [], powerUps = [], particles = [];
let score = 0, frames = 0, speed = 3.5, gameOver = false, started = false;
let highScore = localStorage.getItem("flappyHighScore") || 0;

// --- INPUT ---
const flap = () => {
  if(!started) { started = true; playSound(600, 'sine', 0.2, 0.1); return; }
  if(gameOver) { reset(); return; }
  bird.velocity = bird.jump;
  playSound(450, 'sine', 0.1, 0.1);
};
window.addEventListener("mousedown", flap);
window.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, {passive: false});

function reset(){
  bird.y = canvas.height/2; bird.velocity = 0; bird.shield = false;
  pipes = []; powerUps = []; particles = []; score = 0; frames = 0; speed = 3.5; gameOver = false;
}

// --- LOGICA ---
function createPipe(){
  let gap = Math.max(130, 175 - (score * 1.5));
  let top = Math.random() * (canvas.height - gap - 200) + 60;
  pipes.push({ x: canvas.width, top, bottom: top + gap, width: 75, passed: false, 
               moving: score > 8, offset: Math.random() * Math.PI * 2 });
}

function createPowerUp(){
  powerUps.push({ x: canvas.width, y: Math.random() * (canvas.height - 200) + 100, size: 12, pulse: 0 });
}

function createParticles(x, y, color, count = 12) {
  for(let i=0; i<count; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
  }
}

function update(){
  if(!started || gameOver) return;
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;
  speed = 3.5 + (score * 0.06);

  if(bird.y > canvas.height - 25 || bird.y < 0) hit();
  if(frames % 90 === 0) createPipe();
  if(frames % 450 === 0) createPowerUp();

  pipes.forEach((p, i) => {
    p.x -= speed;
    if(p.moving) {
      let move = Math.sin(frames * 0.04 + p.offset) * 1.8;
      p.top += move; p.bottom += move;
    }
    if(bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width){
      if(bird.y - bird.radius < p.top || bird.y + bird.radius > p.bottom) hit();
    }
    if(!p.passed && bird.x > p.x + p.width){ score++; p.passed = true; playSound(800, 'square', 0.1, 0.05); }
    if(p.x < -100) pipes.splice(i, 1);
  });

  powerUps.forEach((pw, i) => {
    pw.x -= speed; pw.pulse += 0.1;
    if(Math.hypot(bird.x - pw.x, bird.y - pw.y) < bird.radius + pw.size) {
      bird.shield = true;
      playSound(1200, 'sine', 0.3, 0.2); 
      createParticles(pw.x, pw.y, "#00ffff", 25);
      powerUps.splice(i, 1);
    }
    if(pw.x < -50) powerUps.splice(i, 1);
  });

  particles.forEach((pt, i) => {
    pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.02;
    if(pt.life <= 0) particles.splice(i, 1);
  });
  frames++;
}

function hit(){
  if(bird.shield) {
    bird.shield = false;
    playSound(200, 'sawtooth', 0.2, 0.2);
    createParticles(bird.x, bird.y, "#fff", 15);
    return;
  }
  gameOver = true;
  playSound(100, 'sawtooth', 0.4, 0.2);
  if (score > highScore) { highScore = score; localStorage.setItem("flappyHighScore", score); }
}

// --- DESENHO DA SKIN (CORREÇÃO) ---
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.velocity/12)));

  // Corpo
  ctx.fillStyle = "#fdd835";
  ctx.beginPath(); ctx.arc(0, 0, bird.radius, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();

  // Asa (bate conforme a velocidade)
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.ellipse(-5, 2, 7, 5 + Math.sin(frames*0.5)*3, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Olho
  ctx.fillStyle = "white";
  ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "black";
  ctx.beginPath(); ctx.arc(8, -4, 2, 0, Math.PI*2); ctx.fill();

  // Bico
  ctx.fillStyle = "#ff9800";
  ctx.beginPath();
  ctx.moveTo(10, 0); ctx.lineTo(20, 3); ctx.lineTo(10, 6);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Escudo Visual
  if(bird.shield) {
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, bird.radius + 8, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  let night = Math.min(score / 40, 1);
  sky.addColorStop(0, night < 0.5 ? '#4facfe' : '#1e3c72');
  sky.addColorStop(1, night < 0.5 ? '#00f2fe' : '#2a5298');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

  pipes.forEach(p => {
    ctx.fillStyle = "#2e7d32";
    ctx.fillRect(p.x, 0, p.width, p.top);
    ctx.fillRect(p.x, p.bottom, p.width, canvas.height);
    ctx.strokeRect(p.x, 0, p.width, p.top);
  });

  powerUps.forEach(pw => {
    ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(pw.x, pw.y, pw.size + Math.sin(pw.pulse)*3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  particles.forEach(pt => {
    ctx.globalAlpha = pt.life; ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x, pt.y, 3, 3);
  });
  ctx.globalAlpha = 1;

  drawBird();

  ctx.fillStyle = "#689f38"; ctx.fillRect(0, canvas.height - 25, canvas.width, 25);

  if(!started) {
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "white"; ctx.textAlign = "center";
      ctx.font = "bold 35px Arial"; ctx.fillText("FLAPPY PRO", canvas.width/2, canvas.height/2 - 40);
      ctx.font = "bold 18px Arial"; ctx.fillStyle = "#00ffff";
      ctx.fillText("UPDATE 4: SHIELD & SKINS", canvas.width/2, canvas.height/2);
      ctx.fillStyle = "white"; ctx.font = "14px Arial";
      ctx.fillText("CLIQUE PARA VOAR", canvas.width/2, canvas.height/2 + 60);
  }

  if(started && !gameOver) {
    ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
    ctx.fillText(score, canvas.width/2, 80);
  }

  if(gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white"; ctx.textAlign = "center";
    ctx.font = "bold 30px Arial"; ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 60);
    ctx.font = "bold 60px Arial"; ctx.fillStyle = "#ffd700";
    ctx.fillText(score, canvas.width/2, canvas.height/2 + 10);
    ctx.fillStyle = "white"; ctx.font = "16px Arial";
    ctx.fillText("CLIQUE PARA REINICIAR", canvas.width/2, canvas.height/2 + 80);
    ctx.fillStyle = "#00ff00";
    ctx.fillText("RECORDE: " + highScore, canvas.width/2, canvas.height/2 + 110);
  }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
