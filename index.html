<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Pro 5.1 - Corrigido</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial Black; touch-action: none; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// --- ESTADO ---
let menu = true;
let coins = parseInt(localStorage.getItem("coins")) || 0;
let highScore = parseInt(localStorage.getItem("highScore")) || 0;

let skins = [
  {color:"#fdd835", price:0},
  {color:"#ff5252", price:50},
  {color:"#40c4ff", price:100}
];

let ownedSkins = JSON.parse(localStorage.getItem("ownedSkins")) || [0];
let currentSkin = 0;

let bird = { x:80, y:200, r:14, v:0, g:0.32, jump:-6.2, shield:false };

let pipes = [];
let bullets = [];
let particles = [];
let boss = null;
let bossHP = 5;

let score = 0;
let frames = 0;
let speed = 2.8;
let gameOver = false;
let level = 1;

let lastDash = 0;
let lastShot = 0;
const DASH_COOLDOWN = 1200;   // 1.2 segundos
const SHOT_COOLDOWN = 280;    // \~0.28 segundos

let missionDone = localStorage.getItem("mission1") === "true";

// --- INPUT ---
window.addEventListener("mousedown", click);
window.addEventListener("touchstart", touch, {passive:false});

function click(e){ handleInput(e.clientX, e.clientY); }
function touch(e){ 
  e.preventDefault(); 
  handleInput(e.touches[0].clientX, e.touches[0].clientY); 
}

function handleInput(x, y){
  if(menu){
    // Loja
    for(let i = 0; i < skins.length; i++){
      let bx = canvas.width/2 - 120 + i*90;
      if(x > bx && x < bx + 60 && y > 380 && y < 460){
        buySkin(i);
        return;
      }
    }
    menu = false;
    return;
  }

  if(gameOver){ reset(); return; }

  // Dash (D)
  if(x > canvas.width - 150 && y > canvas.height - 90){
    if(Date.now() - lastDash > DASH_COOLDOWN){
      bird.v = -9.5;
      lastDash = Date.now();
      createParticles(bird.x, bird.y, "#ffffff", 15);
    }
    return;
  }

  // Tiro (F)
  if(x > canvas.width - 80 && y > canvas.height - 90){
    if(Date.now() - lastShot > SHOT_COOLDOWN){
      bullets.push({x: bird.x + 15, y: bird.y});
      lastShot = Date.now();
      createParticles(bird.x + 20, bird.y, "#ff9800", 8);
    }
    return;
  }

  // Pulo normal
  bird.v = bird.jump;
}

function reset(){
  bird.y = canvas.height/2; 
  bird.v = 0;
  pipes = []; 
  bullets = []; 
  particles = [];
  boss = null; 
  bossHP = 5;
  score = 0; 
  frames = 0; 
  speed = 2.8; 
  gameOver = false;
}

function buySkin(i){
  if(ownedSkins.includes(i)){
    currentSkin = i;
  } else if(coins >= skins[i].price){
    coins -= skins[i].price;
    ownedSkins.push(i);
    currentSkin = i;
    save();
  }
}

function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("ownedSkins", JSON.stringify(ownedSkins));
  localStorage.setItem("highScore", Math.max(highScore, score));
}

// Partículas
function createParticles(x, y, color, count){
  for(let i = 0; i < count; i++){
    particles.push({
      x: x,
      y: y,
      vx: Math.random()*6 - 3,
      vy: Math.random()*6 - 4,
      life: 25,
      color: color
    });
  }
}

// Desenho do pássaro (mesmo de antes, só mantive)
function drawBird(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  
  if(!menu && !gameOver) {
    let angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v/12));
    ctx.rotate(angle);
  }

  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#222"; ctx.lineWidth = 2.5; ctx.stroke();

  // Asa
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  let wing = Math.sin(frames * 0.45) * 5.5;
  ctx.beginPath();
  ctx.ellipse(-6, 1, 9, 4.5 + wing, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Olho
  ctx.fillStyle = "white";
  ctx.beginPath(); ctx.arc(7, -5, 5.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#111";
  ctx.beginPath(); ctx.arc(9, -5, 2.5, 0, Math.PI*2); ctx.fill();

  // Bico
  ctx.fillStyle = "#ff9800";
  ctx.beginPath();
  ctx.moveTo(12, -1); ctx.lineTo(22, 2); ctx.lineTo(12, 5);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function update(){
  if(menu || gameOver) return;

  bird.v += bird.g;
  bird.y += bird.v;

  level = Math.floor(score / 10) + 1;
  speed = 2.8 + (level * 0.35);

  // Colisão com chão/teto
  if(bird.y > canvas.height - 30 || bird.y < 0) gameOver = true;

  // Gerar canos
  if(frames % 85 === 0){
    let gap = Math.max(130, 170 - level*7);
    let top = Math.random() * (canvas.height - gap - 180) + 80;
    pipes.push({x: canvas.width + 20, top: top, bottom: top + gap, passed: false});
  }

  // Boss a cada 20 pontos
  if(score > 0 && score % 20 === 0 && !boss){
    boss = {x: canvas.width + 50, y: canvas.height/2};
    bossHP = 5;
  }

  // Atualizar canos
  for(let i = pipes.length - 1; i >= 0; i--){
    let p = pipes[i];
    p.x -= speed;

    // Colisão com pássaro
    if(bird.x + bird.r > p.x && bird.x - bird.r < p.x + 65){
      if(bird.y - bird.r < p.top || bird.y + bird.r > p.bottom){
        gameOver = true;
      }
    }

    if(!p.passed && bird.x > p.x + 65){
      score++;
      p.passed = true;
    }

    if(p.x < -80) pipes.splice(i, 1);
  }

  // Atualizar balas
  for(let i = bullets.length - 1; i >= 0; i--){
    let b = bullets[i];
    b.x += 9.5;

    // Colisão com canos
    for(let j = pipes.length - 1; j >= 0; j--){
      let p = pipes[j];
      if(b.x > p.x && b.x < p.x + 65 && 
         (b.y > p.top - 10 && b.y < p.bottom + 10)){
        createParticles(p.x + 30, b.y, "#4ade80", 12);
        pipes.splice(j, 1);
        bullets.splice(i, 1);
        break;
      }
    }

    if(b.x > canvas.width + 50) bullets.splice(i, 1);
  }

  // Atualizar Boss
  if(boss){
    boss.x -= 1.8;
    boss.y = canvas.height/2 + Math.sin(frames/20) * 40;

    // Colisão com pássaro
    if(Math.hypot(bird.x - boss.x, bird.y - boss.y) < 38){
      gameOver = true;
    }

    // Balas atingindo o boss
    for(let i = bullets.length - 1; i >= 0; i--){
      if(Math.hypot(bullets[i].x - boss.x, bullets[i].y - boss.y) < 32){
        bossHP--;
        createParticles(bullets[i].x, bullets[i].y, "#c026d3", 18);
        bullets.splice(i, 1);

        if(bossHP <= 0){
          createParticles(boss.x, boss.y, "#a855f7", 40);
          coins += 15;
          boss = null;
          save();
        }
        break;
      }
    }

    if(boss && boss.x < -80) boss = null;
  }

  // Partículas
  for(let i = particles.length - 1; i >= 0; i--){
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life--;
    if(p.life <= 0) particles.splice(i, 1);
  }

  // Missão
  if(score >= 10 && !missionDone){
    missionDone = true;
    localStorage.setItem("mission1", "true");
    coins += 30;
    save();
  }

  if(gameOver){
    highScore = Math.max(highScore, score);
    save();
  }

  frames++;
}

function draw(){
  // Céu
  ctx.fillStyle = "#4facfe";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if(menu){
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 38px Arial";
    ctx.fillText("FLAPPY PRO 5.1", canvas.width/2, 110);

    ctx.font = "22px Arial";
    ctx.fillText(`Moedas: ${coins}`, canvas.width/2, 170);
    ctx.fillText(`Recorde: ${highScore}`, canvas.width/2, 205);

    drawBird(canvas.width/2, 270, 28, skins[currentSkin].color);

    // Skins
    for(let i = 0; i < skins.length; i++){
      let bx = canvas.width/2 - 120 + i*90;
      ctx.fillStyle = skins[i].color;
      ctx.fillRect(bx, 380, 60, 60);
      ctx.strokeStyle = currentSkin === i ? "#fff" : "#222";
      ctx.lineWidth = currentSkin === i ? 5 : 3;
      ctx.strokeRect(bx, 380, 60, 60);

      ctx.fillStyle = "white";
      ctx.font = "18px Arial";
      ctx.fillText(ownedSkins.includes(i) ? "✓" : skins[i].price, bx + 30, 445);
    }

    ctx.font = "18px Arial";
    ctx.fillText("Toque na tela para começar", canvas.width/2, canvas.height - 80);
    return;
  }

  // Canos
  pipes.forEach(p => {
    ctx.fillStyle = "#22c55e";
    ctx.fillRect(p.x, 0, 65, p.top);
    ctx.fillRect(p.x, p.bottom, 65, canvas.height);
    ctx.fillStyle = "#15803d";
    ctx.fillRect(p.x - 4, 0, 8, p.top);
    ctx.fillRect(p.x - 4, p.bottom, 8, canvas.height);
  });

  // Boss
  if(boss){
    ctx.fillStyle = "#9333ea";
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, 32, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px Arial";
    ctx.textAlign = "center";
    ctx.fillText("👑", boss.x, boss.y + 8);
  }

  // Balas
  bullets.forEach(b => {
    ctx.fillStyle = "#f59e0b";
    ctx.fillRect(b.x, b.y - 3, 18, 6);
    ctx.fillStyle = "#fef08c";
    ctx.fillRect(b.x + 12, b.y - 2, 8, 4);
  });

  // Partículas
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 25;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 5, 5);
  });
  ctx.globalAlpha = 1;

  // Pássaro
  drawBird(bird.x, bird.y, bird.r, skins[currentSkin].color);

  // Score
  ctx.fillStyle = "white";
  ctx.font = "bold 52px Arial";
  ctx.textAlign = "center";
  ctx.fillText(score, canvas.width/2, 85);

  // Botões
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillRect(canvas.width - 155, canvas.height - 95, 65, 65);
  ctx.fillRect(canvas.width - 80, canvas.height - 95, 65, 65);

  ctx.fillStyle = "white";
  ctx.font = "bold 28px Arial";
  ctx.fillText("D", canvas.width - 122, canvas.height - 50);
  ctx.fillText("F", canvas.width - 47, canvas.height - 50);

  ctx.font = "16px Arial";
  ctx.fillText("DASH", canvas.width - 122, canvas.height - 25);
  ctx.fillText("TIRO", canvas.width - 47, canvas.height - 25);

  if(gameOver){
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 55px Arial";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 40);

    ctx.font = "28px Arial";
    ctx.fillText(`Pontos: ${score}`, canvas.width/2, canvas.height/2 + 20);
    ctx.fillText(`Recorde: ${highScore}`, canvas.width/2, canvas.height/2 + 60);

    ctx.font = "22px Arial";
    ctx.fillText("Toque na tela para reiniciar", canvas.width/2, canvas.height/2 + 120);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
