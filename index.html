<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Flappy Pro - 10/10 Edition</title>
<style>
  body { margin: 0; overflow: hidden; background: #70c5ce; touch-action: manipulation; font-family: 'Arial Black', sans-serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let audioCtx;
function playSound(freq, type, duration) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ⚡ 3. Micro melhoria: Jump de -7 para -7.5 (Sugestão do ChatGPT)
let bird = { x: 50, y: 200, radius: 15, velocity: 0, gravity: 0.4, jump: -7.5 };
let pipes = [];
let particles = [];
let cloudX = 0;
let groundX = 0;
let gap = 175; 
let score = 0;
let gameSpeed = 3.5;
let highScore = localStorage.getItem("flappyHighScore") || 0;
let frames = 0;
let gameOver = false;
let gameStarted = false;

const flap = () => { 
  if(!gameStarted) { 
    gameStarted = true; 
    resetGame();
    return;
  }
  if(gameOver) { resetGame(); } 
  else {
    bird.velocity = bird.jump; 
    playSound(400, 'sine', 0.1);
    createParticles(bird.x, bird.y, 5, "rgba(255,255,255,0.5)"); 
  }
};
window.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, {passive: false});
window.addEventListener("mousedown", flap);

function createPipe() {
  let minH = 60, maxH = canvas.height - gap - 100;
  let topH = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
  pipes.push({ x: canvas.width, top: topH, bottom: topH + gap, width: 70, passed: false });
}

function createParticles(x, y, count = 15, color = null) {
  for(let i=0; i<count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*10,
      vy: (Math.random()-0.5)*10,
      radius: Math.random()*5,
      life: 30,
      color: color || `rgba(255, 165, 0, 1)`
    });
  }
}

function resetGame() {
  bird.y = canvas.height / 2; bird.velocity = 0;
  pipes = []; particles = []; score = 0; frames = 0;
  gameSpeed = 3.5;
  gameOver = false;
}

function update() {
  if (!gameStarted) return;

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;
  
  if (bird.y + bird.radius > canvas.height - 20) {
      bird.y = canvas.height - 20 - bird.radius;
      bird.velocity = 0;
      if(!gameOver) endGame();
  }

  if (gameOver) {
    particles.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy; p.life--;
      if(p.life <= 0) particles.splice(i, 1);
    });
    return;
  }
  
  cloudX -= 0.5;
  groundX = (groundX - gameSpeed) % 40;
  gameSpeed = 3.5 + (Math.floor(score / 5) * 0.2);

  if (frames % 90 === 0) createPipe();

  for (let i = pipes.length - 1; i >= 0; i--) {
    let p = pipes[i];
    p.x -= gameSpeed;
    if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width) {
      if (bird.y - bird.radius < p.top || bird.y + bird.radius > p.bottom) endGame();
    }
    if (!p.passed && bird.x > p.x + p.width) {
      score++; p.passed = true;
      playSound(800, 'square', 0.1);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("flappyHighScore", highScore);
      }
    }
    if (p.x + p.width < -20) pipes.splice(i, 1);
  }
  if (bird.y < 0) endGame();
}

function endGame() {
  if(!gameOver) {
    gameOver = true;
    createParticles(bird.x, bird.y, 15);
    // 🔊 1. Som mais forte ao morrer (Sugestão do ChatGPT)
    playSound(120, 'sawtooth', 0.5);
  }
}

function draw() {
  let factor = Math.min(score / 40, 1);
  let r = Math.floor(112 - factor * 82), g = Math.floor(197 - factor * 150), b = Math.floor(206 - factor * 110);
  ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (score > 25) {
      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 200, 0.8)";
      ctx.shadowBlur = 15; ctx.shadowColor = "white";
      ctx.beginPath(); ctx.arc(canvas.width - 80, 80, 30, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
  }

  ctx.fillStyle = score > 20 ? "rgba(200,200,255,0.3)" : "rgba(255,255,255,0.4)";
  for(let i=0; i<5; i++) {
    let xPos = cloudX + (i * 350);
    while (xPos < -200) xPos += canvas.width + 500;
    while (xPos > canvas.width + 300) xPos -= canvas.width + 500;
    ctx.beginPath(); ctx.arc(xPos, 100, 30, 0, Math.PI*2); ctx.arc(xPos + 35, 100, 45, 0, Math.PI*2); ctx.fill();
  }

  pipes.forEach(p => {
    let grad = ctx.createLinearGradient(p.x, 0, p.x + p.width, 0);
    grad.addColorStop(0, '#538111'); grad.addColorStop(0.3, '#75c91e'); grad.addColorStop(1, '#538111');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x, 0, p.width, p.top);
    ctx.fillRect(p.x, p.bottom, p.width, canvas.height - p.bottom - 20);
  });

  ctx.fillStyle = "#ded895"; ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
  ctx.fillStyle = "#75c91e"; ctx.fillRect(0, canvas.height - 25, canvas.width, 5);

  particles.forEach(p => {
    ctx.fillStyle = p.color.replace('1)', `${p.life/30})`);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
  });

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(gameOver ? Math.PI/2 : Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.velocity/10)));
  ctx.beginPath(); ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#f8e71c"; ctx.fill(); ctx.strokeStyle = "#000"; ctx.stroke();
  ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(7, -5, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(9, -5, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  if(gameStarted && !gameOver) {
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 45px Arial";
    ctx.fillText(score, canvas.width / 2, 80);
  }

  // 🏁 2. Pequeno detalhe no menu (Sugestão do ChatGPT)
  if(!gameStarted) {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = "white"; ctx.textAlign = "center";
    ctx.font = "bold 30px Arial";
    ctx.fillText("MINI FLAPPY", canvas.width/2, canvas.height/2 - 40);
    ctx.font = "20px Arial";
    ctx.fillText("TOQUE PARA COMEÇAR", canvas.width/2, canvas.height/2 + 20);
    // Adição do recorde no menu inicial
    ctx.font = "14px Arial";
    ctx.fillText("Recorde: " + highScore, canvas.width/2, canvas.height/2 + 50);
  }

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ded895"; ctx.fillRect(canvas.width/2 - 100, canvas.height/2 - 80, 200, 160);
    ctx.fillStyle = "white"; ctx.font = "bold 20px Arial";
    ctx.fillText("FIM DE JOGO", canvas.width/2, canvas.height/2 - 50);
    ctx.fillStyle = "black"; ctx.font = "bold 14px Arial";
    ctx.fillText("PONTOS: " + score, canvas.width/2, canvas.height/2 - 10);
    ctx.fillText("MELHOR: " + highScore, canvas.width/2, canvas.height/2 + 15);
    let medalColor = score >= 50 ? "#ffd700" : score >= 20 ? "#c0c0c0" : score >= 10 ? "#cd7f32" : null;
    if(medalColor) {
        ctx.fillStyle = medalColor; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2 + 45, 15, 0, Math.PI*2); ctx.fill();
    }
  }
}

function gameLoop() { update(); draw(); frames++; requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
