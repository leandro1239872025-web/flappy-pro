<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Pro 5.1 - Skin Fix</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial Black; touch-action: none; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// --- ESTADO ---
let menu = true;
let coins = parseInt(localStorage.getItem("coins")) || 0;

let skins = [
  {color:"#fdd835", price:0},
  {color:"#ff5252", price:50},
  {color:"#40c4ff", price:100}
];

let ownedSkins = JSON.parse(localStorage.getItem("ownedSkins")) || [0];
let currentSkin = 0;

let bird = {
  x:80, y:200, r:14, v:0, g:0.32, jump:-6.2, shield:false
};

let pipes = [];
let bullets = [];
let boss = null;
let score = 0;
let frames = 0;
let speed = 2.8;
let gameOver = false;
let level = 1;

let missionDone = localStorage.getItem("mission1") === "true";

// --- INPUT ---
window.addEventListener("mousedown", click);
window.addEventListener("touchstart", touch, {passive:false});

function click(e){ handleInput(e.clientX, e.clientY); }
function touch(e){ e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }

function handleInput(x,y){
  if(menu){
    // Lógica da Loja: Clicar nos quadrados
    for(let i=0; i<skins.length; i++){
      let bx = 100 + i*80;
      if(x > bx && x < bx + 50 && y > 400 && y < 450){
        buySkin(i);
        return;
      }
    }
    menu = false;
    return;
  }

  if(gameOver){ reset(); return; }

  // Dash e Tiro
  if(x > canvas.width-140 && y > canvas.height-80){ bird.v = -9; return; }
  if(x > canvas.width-70 && y > canvas.height-80){ bullets.push({x:bird.x,y:bird.y}); return; }

  bird.v = bird.jump;
}

function reset(){
  bird.y = canvas.height/2; bird.v = 0;
  pipes=[]; bullets=[]; boss=null;
  score=0; frames=0; speed=2.8; gameOver=false;
}

function buySkin(i){
  if(ownedSkins.includes(i)){
    currentSkin = i;
  } else if(coins >= skins[i].price){
    coins -= skins[i].price;
    ownedSkins.push(i);
    currentSkin = i;
    save();
  }
}

function save(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("ownedSkins", JSON.stringify(ownedSkins));
}

// --- FUNÇÃO DE DESENHO DA SKIN ---
function drawBird(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  
  if(!menu && !gameOver) {
    let angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v/12));
    ctx.rotate(angle);
  }

  // Corpo
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();

  // Asa Animada
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.beginPath();
  let wing = Math.sin(frames * 0.4) * 5;
  ctx.ellipse(-5, 2, 8, 4 + wing, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Olho
  ctx.fillStyle = "white";
  ctx.beginPath(); ctx.arc(6, -5, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "black";
  ctx.beginPath(); ctx.arc(8, -5, 2, 0, Math.PI*2); ctx.fill();

  // Bico
  ctx.fillStyle = "#ff9800";
  ctx.beginPath();
  ctx.moveTo(10, 0); ctx.lineTo(20, 2); ctx.lineTo(10, 6);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function update(){
  if(menu || gameOver) return;
  bird.v += bird.g; bird.y += bird.v;
  level = Math.floor(score/10)+1;
  speed = 2.8 + (level*0.3);

  if(bird.y > canvas.height-25 || bird.y < 0) gameOver = true;

  if(frames % 100 === 0){
    let gap = 160 - (level*5);
    let top = Math.random()*(canvas.height-gap-200)+60;
    pipes.push({x:canvas.width, top, bottom:top+gap, passed: false});
  }

  if(score>0 && score%20===0 && !boss) boss = {x:canvas.width, y:canvas.height/2};

  pipes.forEach((p,i)=>{
    p.x -= speed;
    if(bird.x + bird.r > p.x && bird.x - bird.r < p.x+60){
      if(bird.y-bird.r < p.top || bird.y+bird.r > p.bottom) gameOver = true;
    }
    if(!p.passed && bird.x > p.x + 60){ score++; p.passed = true; }
    if(p.x < -100) pipes.splice(i,1);
  });

  bullets.forEach((b,bi)=>{ b.x += 8; if(b.x > canvas.width) bullets.splice(bi,1); });

  if(boss){
    boss.x -= 2;
    if(Math.hypot(bird.x-boss.x, bird.y-boss.y) < 30) gameOver = true;
    if(boss.x < -100) boss=null;
  }

  if(score>=10 && !missionDone){
    missionDone = true; localStorage.setItem("mission1","true");
    coins += 30; save();
  }
  frames++;
}

function draw(){
  ctx.fillStyle="#4facfe"; ctx.fillRect(0,0,canvas.width,canvas.height);

  if(menu){
    ctx.fillStyle="white"; ctx.textAlign="center";
    ctx.font="35px Arial"; ctx.fillText("FLAPPY PRO 5.1", canvas.width/2, 120);
    ctx.font="20px Arial"; ctx.fillText("Moedas: "+coins, canvas.width/2, 180);
    
    drawBird(canvas.width/2, 280, 25, skins[currentSkin].color);

    skins.forEach((s,i)=>{
      ctx.fillStyle = s.color;
      ctx.fillRect(100+i*80, 400, 50, 50);
      ctx.strokeStyle = currentSkin === i ? "white" : "black";
      ctx.strokeRect(100+i*80, 400, 50, 50);
      ctx.fillStyle="white"; ctx.fillText(ownedSkins.includes(i) ? "OK" : s.price, 125+i*80, 475);
    });
    return;
  }

  pipes.forEach(p=>{
    ctx.fillStyle="green"; ctx.fillRect(p.x,0,60,p.top); ctx.fillRect(p.x,p.bottom,60,canvas.height);
  });

  if(boss){
    ctx.fillStyle="purple"; ctx.beginPath(); ctx.arc(boss.x,boss.y,25,0,Math.PI*2); ctx.fill();
  }

  bullets.forEach(b=>{ ctx.fillStyle="orange"; ctx.fillRect(b.x,b.y,10,4); });

  // Desenha o Pássaro no Jogo
  drawBird(bird.x, bird.y, bird.r, skins[currentSkin].color);

  ctx.fillStyle="white"; ctx.font="40px Arial"; ctx.textAlign="center";
  ctx.fillText(score, canvas.width/2, 60);

  // Botões UI
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.fillRect(canvas.width-140,canvas.height-80,60,60);
  ctx.fillRect(canvas.width-70,canvas.height-80,60,60);
  ctx.fillStyle="white"; ctx.font="20px Arial";
  ctx.fillText("D", canvas.width-110, canvas.height-45);
  ctx.fillText("F", canvas.width-40, canvas.height-45);

  if(gameOver){
    ctx.fillStyle="white"; ctx.font="40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
