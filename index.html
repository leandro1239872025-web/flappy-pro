<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Flappy Pro - Atmosfera 2.0</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; touch-action: manipulation; font-family: 'Arial Black', sans-serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- Áudio ---
let audioCtx;
function playSound(freq, type, duration, volume = 0.1) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// --- Configurações Iniciais ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let bird = { x: 60, y: 200, radius: 14, velocity: 0, gravity: 0.42, jump: -7.2 };
let pipes = [];
let particles = [];
let clouds = [
    {x: 100, y: 80, s: 0.4}, {x: 400, y: 150, s: 0.6}, {x: 700, y: 100, s: 0.5}
];
let stars = [];
for(let i=0; i<30; i++) stars.push({x: Math.random(), y: Math.random(), size: Math.random()*2});

let score = 0;
let gameSpeed = 3.8;
let highScore = localStorage.getItem("flappyHighScore") || 0;
let frames = 0;
let gameOver = false;
let gameStarted = false;
let countdown = 0;
let isCounting = false;

// --- Controles ---
const flap = () => { 
  if (isCounting) return;
  if(!gameStarted && countdown === 0) { startCountdown(); return; }
  if(gameOver) { resetGame(); startCountdown(); } 
  else if(gameStarted) {
    bird.velocity = bird.jump; 
    playSound(450, 'sine', 0.1, 0.12); 
    // Partículas de pulo
    createParticles(bird.x - 10, bird.y, 4, "rgba(255,255,255,0.6)", 15);
  }
};
window.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, {passive: false});
window.addEventListener("mousedown", flap);

function startCountdown() {
    isCounting = true; gameOver = false; gameStarted = false; countdown = 3;
    bird.y = canvas.height / 2; bird.velocity = 0;
    let timer = setInterval(() => {
        countdown--;
        if(countdown > 0) playSound(300, 'sine', 0.1, 0.1);
        if(countdown === 0) {
            clearInterval(timer); gameStarted = true; isCounting = false;
            playSound(600, 'sine', 0.2, 0.15);
        }
    }, 1000);
}

function resetGame() {
  bird.y = canvas.height / 2; bird.velocity = 0;
  pipes = []; particles = []; score = 0; frames = 0; gameSpeed = 3.8;
}

function createPipe() {
  let gap = Math.max(155, canvas.height * 0.24);
  let topH = Math.floor(Math.random() * (canvas.height - gap - 160)) + 60;
  pipes.push({ x: canvas.width, top: topH, bottom: topH + gap, width: 75, passed: false });
}

function createParticles(x, y, count, color, life = 30) {
  for(let i=0; i<count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
      radius: Math.random()*4, life: life, color: color
    });
  }
}

// --- Lógica de Cores do Céu (Update 2) ---
function getSkyGradient() {
    let phase = Math.min(score / 50, 1); // Escurece até os 50 pontos
    let r1 = 112 - (phase * 100), g1 = 197 - (phase * 160), b1 = 206 - (phase * 140); // Topo
    let r2 = 230 - (phase * 200), g2 = 250 - (phase * 230), b2 = 255 - (phase * 210); // Base
    
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
    grad.addColorStop(1, `rgb(${r2},${g2},${b2})`);
    return grad;
}

function update() {
  if (!gameStarted && !gameOver) {
      bird.y = (canvas.height / 2) + Math.sin(frames / 12) * 15;
      frames++;
      return;
  }

  if (gameStarted && !gameOver) {
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;
    
    if (bird.y + bird.radius > canvas.height - 25 || bird.y - bird.radius < 0) endGame();

    // Nuvens Paralaxe
    clouds.forEach(c => {
        c.x -= 0.5 * c.s;
        if(c.x < -150) c.x = canvas.width + 50;
    });

    gameSpeed = 3.8 + (Math.floor(score / 8) * 0.3);
    if (frames % 85 === 0) createPipe();

    pipes.forEach((p, i) => {
      p.x -= gameSpeed;
      if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + p.width) {
        if (bird.y - bird.radius < p.top || bird.y + bird.radius > p.bottom) endGame();
      }
      if (!p.passed && bird.x > p.x + p.width) {
        score++; p.passed = true;
        playSound(850, 'square', 0.08, 0.1);
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("flappyHighScore", highScore);
        }
      }
      if (p.x + p.width < -50) pipes.splice(i, 1);
    });
    frames++;
  }

  // Partículas Otimizadas
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function endGame() {
  if(!gameOver) {
    gameOver = true;
    createParticles(bird.x, bird.y, 25, "#ff9d00", 40);
    playSound(110, 'sawtooth', 0.5, 0.2);
  }
}

function draw() {
  ctx.fillStyle = getSkyGradient();
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Estrelas (Surgem na Noite)
  let nightPhase = Math.max(0, (score - 20) / 30);
  if(nightPhase > 0) {
      ctx.fillStyle = `rgba(255,255,255,${nightPhase * 0.8})`;
      stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x * canvas.width, s.y * (canvas.height * 0.6), s.size, 0, Math.PI*2);
          ctx.fill();
      });
  }

  // Lua com Glow
  if (score > 15) {
      let luaAlpha = Math.min((score - 15) / 20, 0.9);
      ctx.save();
      ctx.shadowBlur = 20; ctx.shadowColor = "white";
      ctx.fillStyle = `rgba(255, 255, 230, ${luaAlpha})`;
      ctx.beginPath(); ctx.arc(canvas.width - 70, 70, 28, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
  }

  // Nuvens Suaves
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  clouds.forEach(c => {
    ctx.beginPath(); 
    ctx.ellipse(c.x, c.y, 40 * c.s + 20, 25 * c.s + 10, 0, 0, Math.PI*2); 
    ctx.fill();
  });

  // Canos com Gradiente Natural
  pipes.forEach(p => {
    let g = ctx.createLinearGradient(p.x, 0, p.x + p.width, 0);
    g.addColorStop(0, '#4a7c10'); g.addColorStop(0.5, '#7ed321'); g.addColorStop(1, '#4a7c10');
    ctx.fillStyle = g;
    ctx.fillRect(p.x, 0, p.width, p.top);
    ctx.fillRect(p.x, p.bottom, p.width, canvas.height - p.bottom);
    ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.strokeRect(p.x, 0, p.width, p.top);
    ctx.strokeRect(p.x, p.bottom, p.width, canvas.height - p.bottom);
  });

  // Partículas
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Pássaro com Sombra Leve
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(gameOver ? Math.PI/2 : Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.velocity/12)));
  // Sombra
  ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 4; ctx.shadowOffsetY = 3;
  ctx.beginPath(); ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#fdd835"; ctx.fill(); ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
  // Olho e Bico
  ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(8, -4, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#ff9800"; ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(18, 3); ctx.lineTo(10, 6); ctx.fill();
  ctx.restore();

  // Chão
  ctx.fillStyle = "#e1d99d"; ctx.fillRect(0, canvas.height - 25, canvas.width, 25);
  ctx.fillStyle = "#689f38"; ctx.fillRect(0, canvas.height - 30, canvas.width, 5);

  // Interface
  if(gameStarted && !gameOver) {
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 50px Arial";
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 8;
    ctx.fillText(score, canvas.width / 2, 90);
    ctx.shadowBlur = 0;
  }

  if(countdown > 0) {
      ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 90px Arial";
      ctx.fillText(countdown, canvas.width/2, canvas.height/2);
  }

  if(!gameStarted && countdown === 0 && !gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = "white"; ctx.textAlign = "center";
    ctx.font = "bold 40px Arial"; ctx.fillText("FLAPPY ATMOS", canvas.width/2, canvas.height/2 - 40);
    ctx.font = "18px Arial"; ctx.fillText("TOQUE PARA VOAR", canvas.width/2, canvas.height/2 + 20);
  }

  if (gameOver && countdown === 0) {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial";
    ctx.fillText("FIM DE JOGO", canvas.width/2, canvas.height/2 - 60);
    ctx.font = "18px Arial";
    ctx.fillText("PONTOS: " + score, canvas.width/2, canvas.height/2 - 20);
    ctx.fillText("RECORDE: " + highScore, canvas.width/2, canvas.height/2 + 10);
    ctx.font = "bold 14px Arial"; ctx.fillText("TOQUE PARA RECOMEÇAR", canvas.width/2, canvas.height/2 + 70);
  }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
